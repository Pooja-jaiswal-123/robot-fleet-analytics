services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: nav-clickhouse
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP (REST, used by the API)
      - "9000:9000"   # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./data:/data:ro
      - ch-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: nav-backend
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: analytics_api
      CLICKHOUSE_PASSWORD: analytics_api_ro
      CLICKHOUSE_DATABASE: warehouse

      # Groq Configuration
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NL2SQL_MODEL: ${NL2SQL_MODEL:-llama-3.3-70b-versatile}

      CORS_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'

    ports:
      - "8000:8000"

    depends_on:
      clickhouse:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000

    container_name: nav-frontend

    ports:
      - "8080:80"

    depends_on:
      - backend

volumes:
  ch-data: