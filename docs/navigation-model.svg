<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowFaint" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <text x="30" y="36" font-size="20" font-weight="700" fill="#111827">A robot's navigation through the warehouse</text>
  <text x="30" y="58" font-size="13" fill="#6b7280">Each arrow is one navigation span (one row). The legs of a single task share a trace_id.</text>

  <!-- Warehouse floor -->
  <rect x="80" y="90" width="600" height="360" rx="6" fill="#f9fafb" stroke="#9ca3af" stroke-width="2"/>
  <text x="86" y="466" font-size="12" fill="#6b7280">(0, 0)</text>
  <text x="650" y="466" font-size="12" fill="#6b7280">x = 200 m</text>
  <text x="30" y="100" font-size="12" fill="#6b7280">y = 120 m</text>

  <!-- Stations -->
  <g font-size="12" fill="#374151">
    <rect x="110" y="380" width="70" height="34" rx="4" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="118" y="401" >Pick</text>
    <rect x="320" y="120" width="90" height="34" rx="4" fill="#dcfce7" stroke="#4ade80"/>
    <text x="330" y="141">Shelving</text>
    <rect x="560" y="120" width="80" height="34" rx="4" fill="#fef9c3" stroke="#facc15"/>
    <text x="572" y="141">Packing</text>
    <rect x="560" y="380" width="80" height="34" rx="4" fill="#fee2e2" stroke="#f87171"/>
    <text x="568" y="401">Charging</text>
  </g>

  <!-- Second, faint robot path (fleet context) -->
  <g stroke="#9ca3af" stroke-width="2" stroke-dasharray="4 4" fill="none" opacity="0.7">
    <line x1="150" y1="200" x2="300" y2="170" marker-end="url(#arrowFaint)"/>
    <line x1="300" y1="170" x2="430" y2="240" marker-end="url(#arrowFaint)"/>
  </g>
  <circle cx="150" cy="200" r="5" fill="#9ca3af"/>
  <text x="120" y="195" font-size="11" fill="#9ca3af">robot_042</text>

  <!-- Primary robot path: 3 legs = 1 task -->
  <g stroke="#2563eb" stroke-width="3" fill="none">
    <line x1="160" y1="380" x2="330" y2="250" marker-end="url(#arrow)"/>
    <line x1="330" y1="250" x2="490" y2="300" marker-end="url(#arrow)"/>
    <line x1="490" y1="300" x2="610" y2="160" marker-end="url(#arrow)"/>
  </g>

  <!-- Waypoints -->
  <g fill="#1d4ed8">
    <circle cx="160" cy="380" r="6"/>
    <circle cx="330" cy="250" r="6"/>
    <circle cx="490" cy="300" r="6"/>
    <circle cx="610" cy="160" r="6"/>
  </g>
  <g font-size="12" fill="#1e3a8a" font-weight="600">
    <text x="150" y="368">start</text>
    <text x="235" y="305">leg 1</text>
    <text x="400" y="290">leg 2</text>
    <text x="540" y="240">leg 3</text>
    <text x="618" y="156">end</text>
  </g>
  <text x="150" y="430" font-size="12" fill="#1d4ed8" font-weight="700">robot_017 — one task (trace_id), 3 legs</text>
</svg>
